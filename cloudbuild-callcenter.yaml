# Deploy only call-center-service.
# Usage: gcloud builds submit --config cloudbuild-callcenter.yaml .
# Env vars on Cloud Run are unchanged; only the container image is updated.
substitutions:
  _COMMIT_SHA: 'latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/call-center-service:$_COMMIT_SHA', '-f', 'docker/call-center.Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/call-center-service:$_COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'call-center-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/call-center-service:$_COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/convonet-repo/call-center-service:$_COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
