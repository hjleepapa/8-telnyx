<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant — FastAPI WebSocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Voice Assistant</h1>
        <p class="text-sm text-gray-600 mb-6">WebRTC / FastAPI WebSocket (voice-gateway-service). No LiveKit.</p>
        <div id="status" class="mb-4 p-3 rounded-lg bg-gray-100 text-gray-700 text-sm">Connecting to <span id="wsUrl"></span>…</div>
        <div id="authSection" class="mb-4 p-4 rounded-lg bg-amber-50 border border-amber-200">
            <p class="text-sm text-gray-700 mb-2">Enter your PIN to use the voice assistant (if required by your deployment).</p>
            <div class="flex gap-2 items-center">
                <input type="password" id="pinInput" placeholder="PIN" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm" maxlength="20" autocomplete="off">
                <button type="button" id="btnLogin" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700">Login</button>
            </div>
            <p id="authError" class="mt-2 text-sm text-red-600 hidden"></p>
        </div>
        <div id="readySection" class="hidden mb-4">
            <div class="flex gap-3 justify-center">
                <button id="btnStart" disabled class="px-6 py-3 rounded-lg bg-orange-500 text-white font-semibold disabled:opacity-50 disabled:cursor-not-allowed">Start</button>
                <button id="btnStop" disabled class="px-6 py-3 rounded-lg bg-gray-600 text-white font-semibold disabled:opacity-50 disabled:cursor-not-allowed">Stop</button>
            </div>
        </div>
        <div id="transcript" class="mb-2 p-2 rounded bg-blue-50 text-sm text-gray-700 hidden"></div>
        <div id="response" class="mb-2 p-2 rounded bg-green-50 text-sm text-gray-700 hidden"></div>
        <div id="processingBox" class="mb-2 p-3 rounded bg-amber-50 border border-amber-200 hidden">
            <p id="processingStatus" class="text-sm text-amber-800">Please wait…</p>
            <p id="processingElapsed" class="text-lg font-mono font-semibold text-amber-700 mt-1">0s</p>
        </div>
        <div id="log" class="mb-6 h-32 overflow-y-auto rounded bg-gray-50 p-2 text-xs font-mono text-gray-600"></div>
    </div>
    <script>
        (function () {
            const wsPath = "{{ websocket_path | default('/webrtc/ws') }}";
            const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + wsPath;
            document.getElementById('wsUrl').textContent = wsPath;

            let ws = null;
            let sessionId = 'session-' + Math.random().toString(36).slice(2, 11);
            let sequence = 0;
            let mediaRecorder = null;
            let audioChunks = [];
            let stream = null;
            let currentResponseAudio = null;
            let processingTimerId = null;
            let holdMusicCtx = null;
            let holdMusicOsc = null;

            function log(msg) {
                const el = document.getElementById('log');
                el.appendChild(document.createTextNode(new Date().toISOString().slice(11, 23) + ' ' + msg + '\n'));
                el.scrollTop = el.scrollHeight;
            }

            function setStatus(text, ok) {
                const el = document.getElementById('status');
                el.textContent = text;
                el.className = 'mb-4 p-3 rounded-lg text-sm ' + (ok ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-700');
            }

            function stopHoldMusic() {
                if (holdMusicOsc) {
                    try { holdMusicOsc.stop(); } catch (e) {}
                    holdMusicOsc = null;
                }
                if (holdMusicCtx) {
                    try { holdMusicCtx.close(); } catch (e) {}
                    holdMusicCtx = null;
                }
                if (processingTimerId) {
                    clearInterval(processingTimerId);
                    processingTimerId = null;
                }
                document.getElementById('processingBox').classList.add('hidden');
            }

            function startHoldMusicAndTimer(startedAtTs) {
                document.getElementById('processingBox').classList.remove('hidden');
                document.getElementById('processingStatus').textContent = 'Please wait…';
                if (window.speechSynthesis && window.SpeechSynthesisUtterance) {
                    var u = new SpeechSynthesisUtterance('Please wait.');
                    u.rate = 0.9;
                    u.volume = 1;
                    window.speechSynthesis.speak(u);
                }
                function updateElapsed() {
                    var elapsed = Math.floor((Date.now() / 1000) - startedAtTs);
                    document.getElementById('processingElapsed').textContent = elapsed + 's';
                }
                updateElapsed();
                processingTimerId = setInterval(updateElapsed, 1000);
                try {
                    holdMusicCtx = new (window.AudioContext || window.webkitAudioContext)();
                    holdMusicOsc = holdMusicCtx.createOscillator();
                    var gain = holdMusicCtx.createGain();
                    gain.gain.value = 0.03;
                    holdMusicOsc.connect(gain);
                    gain.connect(holdMusicCtx.destination);
                    holdMusicOsc.frequency.value = 220;
                    holdMusicOsc.type = 'sine';
                    holdMusicOsc.start();
                } catch (e) { log('Hold music: ' + e.message); }
            }

            function playAudioFromBase64(b64, mime) {
                if (currentResponseAudio) {
                    try { currentResponseAudio.pause(); } catch (e) {}
                    currentResponseAudio = null;
                }
                mime = mime || 'audio/mpeg';
                const dataUrl = 'data:' + mime + ';base64,' + b64;
                const audio = new Audio(dataUrl);
                currentResponseAudio = audio;
                audio.onended = audio.onerror = function () { currentResponseAudio = null; };
                audio.play().catch(function (e) { log('Play failed: ' + e.message); currentResponseAudio = null; });
            }

            function connect() {
                setStatus('Connecting…', false);
                log('WS connect ' + wsUrl);
                ws = new WebSocket(wsUrl);
                ws.onopen = function () {
                    setStatus('Connected. Enter PIN and click Login.', true);
                    log('Connected');
                    document.getElementById('authSection').classList.remove('hidden');
                    document.getElementById('authError').classList.add('hidden');
                };
                ws.onmessage = function (ev) {
                    try {
                        const msg = JSON.parse(ev.data);
                        log('← ' + (msg.type || 'message'));
                        if (msg.type === 'auth_ok') {
                            document.getElementById('authSection').classList.add('hidden');
                            document.getElementById('readySection').classList.remove('hidden');
                            setStatus('Ready. Click Start, speak, then Stop.', true);
                            document.getElementById('btnStart').disabled = false;
                        }
                        if (msg.type === 'greeting' && msg.data_b64) {
                            playAudioFromBase64(msg.data_b64);
                            setStatus('Playing greeting…', true);
                        }
                        if (msg.type === 'status') {
                            setStatus(msg.message || 'Processing…', true);
                        }
                        if (msg.type === 'processing_start' && msg.started_at_ts != null) {
                            startHoldMusicAndTimer(msg.started_at_ts);
                        }
                        if (msg.type === 'transcript_final' && msg.text) {
                            stopHoldMusic();
                            const el = document.getElementById('transcript');
                            el.textContent = 'You: ' + msg.text;
                            el.classList.remove('hidden');
                        }
                        if (msg.type === 'agent_final' && msg.text) {
                            stopHoldMusic();
                            const el = document.getElementById('response');
                            el.textContent = 'Assistant: ' + msg.text;
                            el.classList.remove('hidden');
                        }
                        if (msg.type === 'audio_chunk' && msg.data_b64) {
                            stopHoldMusic();
                            playAudioFromBase64(msg.data_b64);
                            setStatus('Playing response…', true);
                        }
                        if (msg.type === 'error') {
                            stopHoldMusic();
                            log('Error: ' + (msg.message || ''));
                            if (msg.code === 'auth_failed' || (msg.message && msg.message.toLowerCase().indexOf('pin') !== -1)) {
                                document.getElementById('authError').textContent = msg.message || 'Invalid PIN.';
                                document.getElementById('authError').classList.remove('hidden');
                            } else {
                                setStatus(msg.message || 'Error', false);
                            }
                        }
                    } catch (e) { log('← ' + ev.data.slice(0, 80)); }
                };
                ws.onclose = function () {
                    setStatus('Disconnected.', false);
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnStop').disabled = true;
                    log('Closed');
                };
                ws.onerror = function () { log('WebSocket error'); };
            }

            function doLogin() {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                var pin = (document.getElementById('pinInput').value || '').trim();
                document.getElementById('authError').classList.add('hidden');
                ws.send(JSON.stringify({ type: 'authenticate', session_id: sessionId, pin: pin }));
                log('Sent authenticate (PIN ' + (pin ? '***' : 'empty') + ')');
            }
            document.getElementById('btnLogin').onclick = doLogin;
            document.getElementById('pinInput').onkeydown = function (e) {
                if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
            };

            document.getElementById('btnStart').onclick = function () {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                if (currentResponseAudio) {
                    try { currentResponseAudio.pause(); currentResponseAudio.currentTime = 0; } catch (e) {}
                    currentResponseAudio = null;
                    log('Barge-in: stopped playback');
                }
                stopHoldMusic();
                ws.send(JSON.stringify({ type: 'start_recording', session_id: sessionId, stt_mode: 'streaming', language: 'en-US' }));
                log('Sent start_recording');
                document.getElementById('btnStop').disabled = false;
                audioChunks = [];
                navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
                    stream = s;
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                    mediaRecorder.ondataavailable = function (e) {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };
                    mediaRecorder.start(250);
                    setStatus('Recording… speak now.', true);
                }).catch(function (e) {
                    log('Mic error: ' + e.message);
                    setStatus('Microphone access denied.', false);
                });
            };

            document.getElementById('btnStop').onclick = function () {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                document.getElementById('btnStop').disabled = true;
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.onstop = function () {
                        if (stream) stream.getTracks().forEach(function (t) { t.stop(); });
                        if (audioChunks.length === 0) {
                            ws.send(JSON.stringify({ type: 'stop_recording', session_id: sessionId }));
                            log('No audio; sent stop_recording');
                            return;
                        }
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = function () {
                            const buf = new Uint8Array(reader.result);
                            let binary = '';
                            const chunkSize = 8192;
                            for (let i = 0; i < buf.length; i += chunkSize) {
                                const sub = buf.subarray(i, Math.min(i + chunkSize, buf.length));
                                binary += String.fromCharCode.apply(null, sub);
                            }
                            const b64 = btoa(binary);
                            ws.send(JSON.stringify({
                                type: 'audio_chunk',
                                session_id: sessionId,
                                sequence: 0,
                                timestamp_ms: Date.now(),
                                data_b64: b64
                            }));
                            ws.send(JSON.stringify({ type: 'stop_recording', session_id: sessionId }));
                            log('Sent full recording + stop_recording');
                            setStatus('Processing…', true);
                        };
                        reader.readAsArrayBuffer(blob);
                    };
                    mediaRecorder.stop();
                } else {
                    ws.send(JSON.stringify({ type: 'stop_recording', session_id: sessionId }));
                    log('Sent stop_recording');
                }
            };

            connect();
        })();
    </script>
</body>
</html>
